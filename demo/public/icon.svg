<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Electric blue glow -->
    <filter id="glow-blue" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
    <filter id="glow-cyan" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Background gradient -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A0A0A"/>
      <stop offset="50%" style="stop-color:#050510"/>
      <stop offset="100%" style="stop-color:#0A0A0A"/>
    </linearGradient>
    <!-- Ray gradient -->
    <linearGradient id="ray-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0066FF"/>
      <stop offset="100%" style="stop-color:#00D4FF"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" fill="url(#bg)"/>

  <!-- Subtle grid pattern -->
  <g opacity="0.05" stroke="#0066FF" stroke-width="1">
    <line x1="128" y1="0" x2="128" y2="512"/>
    <line x1="256" y1="0" x2="256" y2="512"/>
    <line x1="384" y1="0" x2="384" y2="512"/>
    <line x1="0" y1="128" x2="512" y2="128"/>
    <line x1="0" y1="256" x2="512" y2="256"/>
    <line x1="0" y1="384" x2="512" y2="384"/>
  </g>

  <!-- Outer frame with blue glow -->
  <rect x="24" y="24" width="464" height="464" fill="none" stroke="#0066FF" stroke-width="6" filter="url(#glow-blue)"/>

  <!-- Inner frame -->
  <rect x="48" y="48" width="416" height="416" fill="none" stroke="white" stroke-width="2" opacity="0.15"/>

  <!-- Corner accents - Blue/Cyan theme -->
  <rect x="24" y="24" width="48" height="6" fill="#0066FF"/>
  <rect x="24" y="24" width="6" height="48" fill="#0066FF"/>

  <rect x="440" y="24" width="48" height="6" fill="#00D4FF"/>
  <rect x="482" y="24" width="6" height="48" fill="#00D4FF"/>

  <rect x="24" y="482" width="48" height="6" fill="#00D4FF"/>
  <rect x="24" y="440" width="6" height="48" fill="#00D4FF"/>

  <rect x="440" y="482" width="48" height="6" fill="#0066FF"/>
  <rect x="482" y="440" width="6" height="48" fill="#0066FF"/>

  <!-- THE RAY ICON - Two converging light beams -->
  <g filter="url(#glow-cyan)">
    <!-- Primary ray (top-left to bottom-right) -->
    <polygon points="120,100 180,100 392,340 392,412 332,412 120,172" fill="#0066FF"/>

    <!-- Secondary ray (top-right to bottom-left) -->
    <polygon points="392,100 392,172 180,412 120,412 120,340 332,100" fill="#00D4FF"/>

    <!-- Center intersection highlight -->
    <circle cx="256" cy="256" r="24" fill="white" opacity="0.9"/>
  </g>

  <!-- Small accent spark -->
  <rect x="400" y="88" width="16" height="16" fill="#00D4FF"/>
  <rect x="96" y="408" width="16" height="16" fill="#0066FF"/>

  <!-- Bottom badge -->
  <rect x="120" y="420" width="272" height="44" fill="#0066FF"/>
  <text x="256" y="450" font-family="Arial Black, Arial, sans-serif" font-size="24" font-weight="900" fill="white" text-anchor="middle" letter-spacing="3">STELLARAY</text>
</svg>
