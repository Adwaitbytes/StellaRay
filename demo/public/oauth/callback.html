<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>zkLogin OAuth Callback</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #fff;
    }
    .container {
      text-align: center;
      padding: 2rem;
    }
    .loader {
      width: 48px;
      height: 48px;
      border: 3px solid rgba(57, 255, 20, 0.1);
      border-top-color: #39FF14;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 1.5rem;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    h1 {
      font-size: 1.5rem;
      margin-bottom: 0.5rem;
      color: #39FF14;
    }
    p {
      color: rgba(255, 255, 255, 0.6);
      font-size: 0.9rem;
    }
    .error {
      background: rgba(255, 59, 48, 0.1);
      border: 1px solid rgba(255, 59, 48, 0.3);
      border-radius: 8px;
      padding: 1rem;
      margin-top: 1rem;
      color: #ff3b30;
    }
    .success {
      color: #39FF14;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="loader" id="loader"></div>
    <h1 id="status">Authenticating...</h1>
    <p id="message">Please wait while we complete your login.</p>
    <div class="error" id="error" style="display: none;"></div>
  </div>

  <script>
    (function() {
      const statusEl = document.getElementById('status');
      const messageEl = document.getElementById('message');
      const loaderEl = document.getElementById('loader');
      const errorEl = document.getElementById('error');

      function showError(message) {
        loaderEl.style.display = 'none';
        statusEl.textContent = 'Authentication Failed';
        statusEl.style.color = '#ff3b30';
        messageEl.textContent = 'There was a problem with your login.';
        errorEl.style.display = 'block';
        errorEl.textContent = message;
      }

      function showSuccess() {
        loaderEl.style.display = 'none';
        statusEl.textContent = 'Success!';
        statusEl.classList.add('success');
        messageEl.textContent = 'You are now logged in. This window will close automatically.';
      }

      try {
        // Parse the URL for tokens
        // Google uses hash fragment, Apple may use query params
        const hashParams = new URLSearchParams(window.location.hash.slice(1));
        const queryParams = new URLSearchParams(window.location.search);

        // Try to get the ID token from hash (Google implicit flow)
        let idToken = hashParams.get('id_token');
        let accessToken = hashParams.get('access_token');
        let error = hashParams.get('error');
        let errorDescription = hashParams.get('error_description');

        // Also check query params (for code flow or Apple)
        if (!idToken && !error) {
          idToken = queryParams.get('id_token');
          error = queryParams.get('error');
          errorDescription = queryParams.get('error_description');
        }

        // Check for authorization code (code flow)
        const code = queryParams.get('code');
        const state = queryParams.get('state');

        // Prepare the callback message
        const callbackMessage = {
          type: 'oauth-callback',
          id_token: idToken,
          access_token: accessToken,
          code: code,
          state: state,
          error: error,
          error_description: errorDescription,
        };

        // Send message to parent window
        if (window.opener) {
          window.opener.postMessage(callbackMessage, window.location.origin);

          if (error) {
            showError(errorDescription || error || 'Authentication was cancelled.');
            // Close after showing error
            setTimeout(() => window.close(), 3000);
          } else if (idToken || code) {
            showSuccess();
            // Close window after short delay
            setTimeout(() => window.close(), 1500);
          } else {
            showError('No authentication token received.');
            setTimeout(() => window.close(), 3000);
          }
        } else {
          // No opener (direct navigation) - redirect to home
          showError('Invalid authentication flow. Redirecting to home...');
          setTimeout(() => {
            window.location.href = '/';
          }, 2000);
        }

      } catch (err) {
        console.error('OAuth callback error:', err);
        showError('An unexpected error occurred: ' + err.message);

        // Try to notify parent anyway
        if (window.opener) {
          window.opener.postMessage({
            type: 'oauth-callback',
            error: 'callback_error',
            error_description: err.message,
          }, window.location.origin);

          setTimeout(() => window.close(), 3000);
        }
      }
    })();
  </script>
</body>
</html>
