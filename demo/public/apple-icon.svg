<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Glow filter for eye -->
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <!-- Strong glow for bolt -->
    <filter id="bolt-glow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur stdDeviation="10" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <!-- Eye gradient - cyan/blue edges, white center -->
    <linearGradient id="eye-grad" x1="0%" y1="50%" x2="100%" y2="50%">
      <stop offset="0%" stop-color="#00AAFF" />
      <stop offset="40%" stop-color="#FFFFFF" />
      <stop offset="60%" stop-color="#FFFFFF" />
      <stop offset="100%" stop-color="#00CCFF" />
    </linearGradient>

    <!-- Bolt gradient - white at top-right to blue at bottom-left -->
    <linearGradient id="bolt-grad" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#FFFFFF" />
      <stop offset="40%" stop-color="#88DDFF" />
      <stop offset="100%" stop-color="#0066FF" />
    </linearGradient>

    <!-- Background -->
    <radialGradient id="bg-grad" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#0A1020" />
      <stop offset="100%" stop-color="#020408" />
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" fill="url(#bg-grad)"/>

  <!-- Eye shape - horizontal lens/almond -->
  <g filter="url(#glow)" transform="translate(256, 256) scale(4.5) translate(-50, -50)">
    <!-- Top arc -->
    <path
      d="M 10 50 Q 30 20, 50 20 Q 70 20, 90 50"
      fill="none"
      stroke="url(#eye-grad)"
      stroke-width="4.5"
      stroke-linecap="round"
    />
    <!-- Bottom arc -->
    <path
      d="M 10 50 Q 30 80, 50 80 Q 70 80, 90 50"
      fill="none"
      stroke="url(#eye-grad)"
      stroke-width="4.5"
      stroke-linecap="round"
    />
  </g>

  <!-- Lightning bolt - from TOP-RIGHT to BOTTOM-LEFT -->
  <g filter="url(#bolt-glow)" transform="translate(256, 256) scale(4.5) translate(-50, -50)">
    <line
      x1="88"
      y1="5"
      x2="12"
      y2="95"
      stroke="url(#bolt-grad)"
      stroke-width="6"
      stroke-linecap="round"
    />
  </g>
</svg>
