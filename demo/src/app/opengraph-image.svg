<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg-grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A0A0A"/>
      <stop offset="50%" style="stop-color:#1A1A2E"/>
      <stop offset="100%" style="stop-color:#0A0A0A"/>
    </linearGradient>
    <filter id="neon-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="text-glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="url(#bg-grad)"/>

  <!-- Grid pattern -->
  <g stroke="#39FF14" stroke-opacity="0.1" stroke-width="1">
    <line x1="0" y1="0" x2="0" y2="630"/>
    <line x1="100" y1="0" x2="100" y2="630"/>
    <line x1="200" y1="0" x2="200" y2="630"/>
    <line x1="300" y1="0" x2="300" y2="630"/>
    <line x1="400" y1="0" x2="400" y2="630"/>
    <line x1="500" y1="0" x2="500" y2="630"/>
    <line x1="600" y1="0" x2="600" y2="630"/>
    <line x1="700" y1="0" x2="700" y2="630"/>
    <line x1="800" y1="0" x2="800" y2="630"/>
    <line x1="900" y1="0" x2="900" y2="630"/>
    <line x1="1000" y1="0" x2="1000" y2="630"/>
    <line x1="1100" y1="0" x2="1100" y2="630"/>
    <line x1="0" y1="100" x2="1200" y2="100"/>
    <line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="0" y1="300" x2="1200" y2="300"/>
    <line x1="0" y1="400" x2="1200" y2="400"/>
    <line x1="0" y1="500" x2="1200" y2="500"/>
  </g>

  <!-- Border frame -->
  <rect x="20" y="20" width="1160" height="590" fill="none" stroke="#39FF14" stroke-width="4" filter="url(#neon-glow)"/>

  <!-- Corner accents -->
  <rect x="20" y="20" width="60" height="8" fill="#FF3366"/>
  <rect x="20" y="20" width="8" height="60" fill="#FF3366"/>
  <rect x="1120" y="20" width="60" height="8" fill="#00D4FF"/>
  <rect x="1172" y="20" width="8" height="60" fill="#00D4FF"/>
  <rect x="20" y="602" width="60" height="8" fill="#FFD600"/>
  <rect x="20" y="550" width="8" height="60" fill="#FFD600"/>
  <rect x="1120" y="602" width="60" height="8" fill="#39FF14"/>
  <rect x="1172" y="550" width="8" height="60" fill="#39FF14"/>

  <!-- Logo section -->
  <g transform="translate(100, 180)">
    <!-- S icon box -->
    <rect x="0" y="0" width="180" height="180" fill="none" stroke="#FFFFFF" stroke-width="6"/>
    <rect x="0" y="0" width="30" height="6" fill="#FF3366"/>
    <rect x="0" y="0" width="6" height="30" fill="#FF3366"/>

    <!-- S letter -->
    <g filter="url(#text-glow)">
      <rect x="35" y="30" width="110" height="28" fill="#FFFFFF"/>
      <rect x="35" y="30" width="28" height="60" fill="#FFFFFF"/>
      <rect x="35" y="72" width="110" height="28" fill="#FFFFFF"/>
      <rect x="117" y="72" width="28" height="60" fill="#FFFFFF"/>
      <rect x="35" y="114" width="110" height="28" fill="#FFFFFF"/>
    </g>

    <!-- Accent line -->
    <rect x="25" y="85" width="140" height="4" fill="#FF3366" transform="rotate(-12 90 90)"/>
    <rect x="150" y="30" width="12" height="12" fill="#39FF14"/>
  </g>

  <!-- Main text -->
  <text x="320" y="260" font-family="Arial Black, sans-serif" font-size="80" font-weight="900" fill="#FFFFFF" filter="url(#text-glow)">STELLAR</text>
  <text x="320" y="340" font-family="Arial Black, sans-serif" font-size="80" font-weight="900" fill="#FF3366">GATEWAY</text>

  <!-- Tagline -->
  <text x="320" y="400" font-family="Arial, sans-serif" font-size="28" fill="#FFFFFF" fill-opacity="0.7">Web3 Wallet with Zero Complexity</text>

  <!-- Feature badges -->
  <g transform="translate(320, 440)">
    <rect x="0" y="0" width="140" height="36" fill="#39FF14"/>
    <text x="70" y="25" font-family="Arial Black, sans-serif" font-size="14" fill="#000000" text-anchor="middle">ZKLOGIN</text>

    <rect x="160" y="0" width="140" height="36" fill="none" stroke="#00D4FF" stroke-width="3"/>
    <text x="230" y="25" font-family="Arial Black, sans-serif" font-size="14" fill="#00D4FF" text-anchor="middle">X-RAY PROTO</text>

    <rect x="320" y="0" width="140" height="36" fill="none" stroke="#FF3366" stroke-width="3"/>
    <text x="390" y="25" font-family="Arial Black, sans-serif" font-size="14" fill="#FF3366" text-anchor="middle">SELF-CUSTODY</text>
  </g>

  <!-- Stats section -->
  <g transform="translate(900, 180)">
    <rect x="0" y="0" width="200" height="100" fill="none" stroke="#39FF14" stroke-width="3"/>
    <text x="100" y="45" font-family="Arial Black, sans-serif" font-size="36" fill="#39FF14" text-anchor="middle">10K</text>
    <text x="100" y="75" font-family="Arial, sans-serif" font-size="16" fill="#FFFFFF" fill-opacity="0.6" text-anchor="middle">FREE XLM</text>
  </g>

  <g transform="translate(900, 300)">
    <rect x="0" y="0" width="200" height="100" fill="none" stroke="#FF3366" stroke-width="3"/>
    <text x="100" y="45" font-family="Arial Black, sans-serif" font-size="36" fill="#FF3366" text-anchor="middle">3-5s</text>
    <text x="100" y="75" font-family="Arial, sans-serif" font-size="16" fill="#FFFFFF" fill-opacity="0.6" text-anchor="middle">TX SPEED</text>
  </g>

  <g transform="translate(900, 420)">
    <rect x="0" y="0" width="200" height="100" fill="none" stroke="#00D4FF" stroke-width="3"/>
    <text x="100" y="45" font-family="Arial Black, sans-serif" font-size="36" fill="#00D4FF" text-anchor="middle">100%</text>
    <text x="100" y="75" font-family="Arial, sans-serif" font-size="16" fill="#FFFFFF" fill-opacity="0.6" text-anchor="middle">PRIVATE</text>
  </g>

  <!-- Bottom URL -->
  <text x="600" y="580" font-family="JetBrains Mono, monospace" font-size="20" fill="#39FF14" fill-opacity="0.8" text-anchor="middle" filter="url(#text-glow)">stellar-gateway.vercel.app</text>
</svg>
