<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A0A0A"/>
      <stop offset="50%" style="stop-color:#0D0D1A"/>
      <stop offset="100%" style="stop-color:#0A0A0A"/>
    </linearGradient>
    <filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background with iOS rounded corners -->
  <rect width="180" height="180" rx="40" fill="url(#bg)"/>

  <!-- Border frame -->
  <rect x="8" y="8" width="164" height="164" rx="32" fill="none" stroke="#39FF14" stroke-width="3" filter="url(#glow)"/>

  <!-- Corner accents -->
  <rect x="8" y="8" width="16" height="3" fill="#FF3366"/>
  <rect x="8" y="8" width="3" height="16" fill="#FF3366"/>
  <rect x="156" y="8" width="16" height="3" fill="#00D4FF"/>
  <rect x="169" y="8" width="3" height="16" fill="#00D4FF"/>
  <rect x="8" y="169" width="16" height="3" fill="#FFD600"/>
  <rect x="8" y="153" width="3" height="16" fill="#FFD600"/>
  <rect x="156" y="169" width="16" height="3" fill="#39FF14"/>
  <rect x="169" y="153" width="3" height="16" fill="#39FF14"/>

  <!-- Main S - Brutalist -->
  <g filter="url(#glow)">
    <rect x="42" y="32" width="96" height="20" fill="white"/>
    <rect x="42" y="32" width="20" height="58" fill="white"/>
    <rect x="42" y="70" width="96" height="20" fill="white"/>
    <rect x="118" y="70" width="20" height="58" fill="white"/>
    <rect x="42" y="108" width="96" height="20" fill="white"/>
  </g>

  <!-- Diagonal accent -->
  <rect x="35" y="85" width="110" height="4" fill="#FF3366" transform="rotate(-15 90 90)"/>

  <!-- Small accents -->
  <rect x="142" y="32" width="8" height="8" fill="#39FF14"/>
  <rect x="30" y="118" width="8" height="8" fill="#00D4FF"/>

  <!-- Bottom badge -->
  <rect x="42" y="140" width="96" height="16" fill="#39FF14"/>
  <text x="90" y="152" font-family="Arial Black, Arial, sans-serif" font-size="9" font-weight="900" fill="black" text-anchor="middle" letter-spacing="1">STELLAR</text>
</svg>
