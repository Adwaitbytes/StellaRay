<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Neon glow filters -->
    <filter id="glow-green" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="glow-pink" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Gradient for depth -->
    <linearGradient id="bg-gradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0A0A0A"/>
      <stop offset="100%" style="stop-color:#1A1A2E"/>
    </linearGradient>
    <!-- Neon green gradient -->
    <linearGradient id="neon-green" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#39FF14"/>
      <stop offset="100%" style="stop-color:#00FF88"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="512" height="512" fill="url(#bg-gradient)"/>

  <!-- Outer border frame -->
  <rect x="16" y="16" width="480" height="480" fill="none" stroke="#39FF14" stroke-width="12" filter="url(#glow-green)"/>

  <!-- Inner accent corners -->
  <path d="M16 16 L80 16 L80 28 L28 28 L28 80 L16 80 Z" fill="#FF3366"/>
  <path d="M496 16 L432 16 L432 28 L484 28 L484 80 L496 80 Z" fill="#00D4FF"/>
  <path d="M16 496 L80 496 L80 484 L28 484 L28 432 L16 432 Z" fill="#FFD600"/>
  <path d="M496 496 L432 496 L432 484 L484 484 L484 432 L496 432 Z" fill="#39FF14"/>

  <!-- Main "S" letter - Bold brutalist style -->
  <g filter="url(#glow-green)">
    <!-- S shape made of rectangles for brutalist feel -->
    <rect x="140" y="100" width="232" height="56" fill="#FFFFFF"/>
    <rect x="140" y="100" width="56" height="156" fill="#FFFFFF"/>
    <rect x="140" y="200" width="232" height="56" fill="#FFFFFF"/>
    <rect x="316" y="200" width="56" height="156" fill="#FFFFFF"/>
    <rect x="140" y="300" width="232" height="56" fill="#FFFFFF"/>
  </g>

  <!-- Accent slash through S -->
  <rect x="120" y="240" width="280" height="8" fill="#FF3366" transform="rotate(-12 256 256)" filter="url(#glow-pink)"/>

  <!-- Small detail squares -->
  <rect x="380" y="100" width="24" height="24" fill="#39FF14"/>
  <rect x="108" y="332" width="24" height="24" fill="#00D4FF"/>

  <!-- Bottom badge -->
  <rect x="156" y="380" width="200" height="32" fill="#39FF14"/>
  <text x="256" y="404" font-family="Arial Black, sans-serif" font-size="20" font-weight="900" fill="#000000" text-anchor="middle">STELLAR</text>
</svg>
